name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /var/www/nafld

jobs:
  # ─────────────────────────────────────────────
  # 1. CI — run tests before any deployment
  # ─────────────────────────────────────────────
  test:
    name: Run Laravel Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: nafld_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, bcmath, zip, curl

      - name: Install PHP dependencies
        working-directory: backend-app
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-app/package-lock.json

      - name: Install JS dependencies & build
        working-directory: backend-app
        run: |
          npm ci
          npm run build

      - name: Prepare .env for tests
        working-directory: backend-app
        run: |
          cp .env.example .env
          sed -i 's|DB_CONNECTION=sqlite|DB_CONNECTION=mysql|' .env
          sed -i 's|# DB_HOST=127.0.0.1|DB_HOST=127.0.0.1|' .env
          sed -i 's|# DB_PORT=3306|DB_PORT=3306|' .env
          sed -i 's|# DB_DATABASE=laravel|DB_DATABASE=nafld_test|' .env
          sed -i 's|# DB_USERNAME=root|DB_USERNAME=root|' .env
          sed -i 's|# DB_PASSWORD=|DB_PASSWORD=secret|' .env
          php artisan key:generate

      - name: Run migrations
        working-directory: backend-app
        run: php artisan migrate --force

      - name: Run tests
        working-directory: backend-app
        run: php artisan test --compact

  # ─────────────────────────────────────────────
  # 2. Deploy Laravel + FastAPI to droplet
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, bcmath, zip, curl

      - name: Build Laravel assets
        working-directory: backend-app
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            # ── Laravel ──────────────────────────────────────────────────
            cd ${{ env.DEPLOY_PATH }}/backend-app

            git pull origin main

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm ci && npm run build

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # ── FastAPI ──────────────────────────────────────────────────
            cd ${{ env.DEPLOY_PATH }}/ai-service

            git pull origin main

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Reload FastAPI (graceful restart via systemd)
            sudo systemctl restart nafld-ai

            echo "Deployment complete ✓"

      - name: Verify FastAPI health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            sleep 5
            curl -sf http://127.0.0.1:8000/health || (echo "FastAPI health check failed!" && exit 1)
            echo "FastAPI is healthy ✓"
