services:
  backend:
    build:
      context: .
      dockerfile: backend-app/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: nafld
      DB_USERNAME: nafld
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      LOG_CHANNEL: stderr
      FASTAPI_URL: http://ai:8001
      FASTAPI_TIMEOUT: "30"
      FASTAPI_INTERNAL_TOKEN: ${FASTAPI_INTERNAL_TOKEN:-dev-token}
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: nafld
      MYSQL_USER: nafld
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unafld", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      FASTAPI_INTERNAL_TOKEN: ${FASTAPI_INTERNAL_TOKEN:-dev-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  mysql_data:
  storage_data:
